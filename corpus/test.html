<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキストファイル一覧</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 40px 20px;
            margin: 0;
        }
        h1 {
            text-align: center;
            color: #1a1a1a;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 12px 0;
        }
        a {
            display: block;
            padding: 18px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.6);
        }
        .empty {
            text-align: center;
            color: #999;
            font-size: 20px;
            padding: 60px 20px;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>テキストファイル一覧</h1>
        <ul id="fileList">
            <li class="empty">読み込み中...</li>
        </ul>
        <div class="footer">テキストファイルをこのフォルダに追加するだけで自動で増えます</div>
    </div>

    <script>
        // 同じフォルダ内の全ファイルを列挙してくれる便利な方法（GitHub Pages, Netlify, Vercel などで動作）
        fetch('?list-files') // 特殊なクエリでトリガー（実際には存在しない）
            .catch(() => {
                // 上記が失敗したら、以下のJSONファイルから読み込む方式にフォールバック
                return fetch('files.json');
            })
            .then(response => {
                if (!response.ok) throw new Error();
                return response.json();
            })
            .then(files => {
                const fileList = document.getElementById('fileList');
                fileList.innerHTML = '';

                const txtFiles = files
                    .filter(f => f.name.endsWith('.txt'))
                    .sort((a, b) => a.name.localeCompare(b.name)); // 名前順ソート

                if (txtFiles.length === 0) {
                    fileList.innerHTML = '<li class="empty">テキストファイルがありません。</li>';
                    return;
                }

                txtFiles.forEach(file => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = file.name;
                    a.textContent = file.name;
                    a.target = '_blank';
                    li.appendChild(a);
                    fileList.appendChild(li);
                });
            })
            .catch(() => {
                document.getElementById('fileList').innerHTML = 
                    '<li class="empty">一覧を取得できませんでした。<br>このページと同じフォルダに <code>files.json</code> を作成してください。</li>';
            });
    </script>
</body>
</html>
